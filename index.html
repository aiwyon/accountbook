<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日常记账本 - 首页</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #e8f0fe;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .hero {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: #fff;
            border-radius: 20px;
            padding: 40px 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(74, 144, 217, 0.35);
        }
        .hero .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .hero p {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 6px;
        }
        .hero .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.9;
        }
        .hero .features span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #4a90d9;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.92; }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: #fff;
        }

        .quick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .quick-stats .stat-item {
            background: #f0f5fe;
            border-radius: 12px;
            padding: 14px 8px;
        }
        .quick-stats .stat-item .num {
            font-size: 22px;
            font-weight: 700;
            color: #4a90d9;
        }
        .quick-stats .stat-item .label {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .footer {
            font-size: 12px;
            color: #aaa;
            margin-top: 12px;
        }
        .footer a {
            color: #4a90d9;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .hero { padding: 28px 18px 24px; }
            .hero h1 { font-size: 24px; }
            .quick-stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="icon">📒</div>
            <h1>日常记账本</h1>
            <p>清晰记录每一笔收支，轻松管理您的财务</p>
            <div class="features">
                <span>✅ 收支记录</span>
                <span>📊 图表统计</span>
                <span>💰 额度管理</span>
                <span>💾 本地存储</span>
            </div>
        </div>

        <a href="expense-tracker.html" class="btn btn-primary">🚀 进入记账本</a>

        <div class="card">
            <h2>📋 功能一览</h2>
            <div style="text-align:left;font-size:14px;color:#555;line-height:2;">
                <div>• 每日收支录入，支持多级分类</div>
                <div>• 月度开支额度管理，超支自动提醒</div>
                <div>• 饼图 / 柱状图多维度统计</div>
                <div>• 数据存储在本地，安全可靠</div>
                <div>• 移动端优先，随时随地使用</div>
            </div>
        </div>

        <div class="card">
            <h2>⚡ 快速开始</h2>
            <p style="font-size:14px;color:#666;margin-bottom:16px;">
                点击上方按钮进入记账应用。<br>
                首次使用请先设置月度预算，然后开始记录您的第一笔收支。
            </p>
            <div class="quick-stats">
                <div class="stat-item">
                    <div class="num">💰</div>
                    <div class="label">设置预算</div>
                </div>
                <div class="stat-item">
                    <div class="num">📝</div>
                    <div class="label">记录收支</div>
                </div>
                <div class="stat-item">
                    <div class="num">📊</div>
                    <div class="label">查看统计</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="expense-tracker.html">直接打开记账本 →</a>
        </div>
    </div>
</body>
</html>
